name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build plugin
        run: |
          npm ci
          npm run build


      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          # Publish directly (no --draft): the community directory matches the repo manifest version
          # against a PUBLISHED release, so a draft leaves a window where the two disagree.
          gh release create "$tag" \
            --title="$tag" \
            --latest \
            --notes "Drive Attachments $tag" \
            main.js manifest.json styles.css
