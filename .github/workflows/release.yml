name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build plugin
        run: |
          npm ci
          npm run build


      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          # Create a DRAFT only. The maintainer publishes it from a personal token
          # (gh release edit "$tag" --draft=false --latest). A release PUBLISHED by this Action's
          # GITHUB_TOKEN does NOT emit the release webhook (GitHub suppresses it to avoid recursive
          # runs), so the Obsidian community directory never sees it and won't re-run its review.
          # Publishing the draft with a user token fires release:published and triggers the re-scan.
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            --notes "Drive Attachments $tag" \
            main.js manifest.json styles.css
